# TLS overlay — puts Caddy (automatic HTTPS) in front of the server stack.
#
# Caddy fetches + auto-renews a free Let's Encrypt certificate for your domain and reverse-proxies
# to the server container, so the whole team reaches https://<your-domain> securely.
#
# Prereqs: your domain's DNS A record points at this host; ports 80 + 443 are open.
# Run:
#   MANTHANA_DOMAIN=manthana.acme.com \
#     docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
# Then enroll pointing at the domain:
#   manthana-server enroll acme platform --open --server-url https://manthana.acme.com

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    # Path-routed, NOT a one-liner. `caddy reverse-proxy --to server:8000` sends the
    # whole site to the API and leaves the Next.js wiki client (started by the base
    # compose file on :3000) unreachable — the wiki is what people actually visit.
    # Both upstreams must share one hostname: the console session cookie is
    # path=/ui and httponly, so a second hostname could never carry it.
    environment:
      MANTHANA_DOMAIN: ${MANTHANA_DOMAIN:?set MANTHANA_DOMAIN to your domain}
    command: caddy run --config /etc/caddy/Caddyfile
    volumes:
      - ./deploy/Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # persists the TLS certificate across restarts
      - caddy_config:/config
    depends_on:
      - server
      - web

volumes:
  caddy_data:
  caddy_config:
