# Dev infrastructure for the Manthana server.
# Tests run on SQLite + in-memory object store (no services needed); this brings
# up Postgres (with pgvector, for the later skill miner) and MinIO (S3-compatible
# object store) for running the server against production-like backends.
#
#   docker compose up -d
#   export MANTHANA_SERVER_DB_URL=postgresql+psycopg://manthana:manthana@localhost:5433/manthana
#   export MANTHANA_SERVER_OBJECT_STORE=s3 MANTHANA_SERVER_S3_BUCKET=manthana-raw
#   uv run manthana-server serve

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: manthana
      POSTGRES_PASSWORD: manthana
      POSTGRES_DB: manthana
    ports:
      - "5433:5432"  # host 5433 (avoids clashing with a host Postgres on 5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manthana"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: manthana
      MINIO_ROOT_PASSWORD: manthana-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
