# Build the Apache CLI wheels + attach them (and the installer) to the GitHub Release on a
# version tag. Engineers then install via:
#   curl -LsSf https://github.com/<owner>/manthana/releases/latest/download/install.sh | sh
name: publish-wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # create/upload release assets

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build the client + server wheels
        run: |
          for pkg in manthana-schemas manthana-collectors manthana-skills manthana manthana-server; do
            uv build --package "$pkg" --wheel --out-dir dist
          done
          ls -l dist

      - name: Attach wheels + installer to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            scripts/install.sh
