# EXAMPLE — copy to secret.yaml, fill real values, and DO NOT commit it.
# Better: create from the CLI so secrets never hit a file:
#   kubectl create secret generic manthana-server-secrets \
#     --from-literal=MANTHANA_SERVER_JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=MANTHANA_SERVER_ADMIN_TOKEN="$(openssl rand -hex 24)" \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-..." \
#     --from-literal=MANTHANA_SERVER_S3_ACCESS_KEY="..." \
#     --from-literal=MANTHANA_SERVER_S3_SECRET_KEY="..."
apiVersion: v1
kind: Secret
metadata:
  name: manthana-server-secrets
type: Opaque
stringData:
  MANTHANA_SERVER_JWT_SECRET: "change-me-32+-random-bytes"
  MANTHANA_SERVER_ADMIN_TOKEN: "change-me-admin-token"
  ANTHROPIC_API_KEY: "sk-ant-..." # only if MANTHANA_SERVER_LLM=anthropic
  MANTHANA_SERVER_S3_ACCESS_KEY: "..."
  MANTHANA_SERVER_S3_SECRET_KEY: "..."
