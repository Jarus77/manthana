apiVersion: apps/v1
kind: Deployment
metadata:
  name: manthana-server
  labels: { app: manthana-server }
spec:
  replicas: 1 # stateless app; scale freely once Postgres/S3 are external
  selector:
    matchLabels: { app: manthana-server }
  template:
    metadata:
      labels: { app: manthana-server }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: server
          # Pinned to a published release tag. Both halves of this string are
          # load-bearing and both were wrong: the owner must match what
          # .github/workflows/publish-image.yml pushes (ghcr.io/<repository-owner>/…),
          # and the tag had been left at 0.2.0 through four releases.
          image: ghcr.io/jarus77/manthana-server:0.6.5
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: manthana-server-config }
            - secretRef: { name: manthana-server-secrets }
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 } # DB-ping gated
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { memory: "512Mi" }
